name: Container CI/CD

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Part 1 — Per-service verification (runs on every PR and push).
  # Installs deps, runs tests, runs a build check, then builds the Docker image
  # LOCALLY (no push). NOTE: services are Python/Django, so this adapts the
  # Node example from the brief to Python (pip + manage.py test/check).
  # ---------------------------------------------------------------------------
  verify:
    name: Verify code, build, and containers
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: service-a
            path: ./services/service-a
          - service: service-b
            path: ./services/service-b
          - service: service-c
            path: ./services/service-c
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ${{ matrix.path }}/requirements.txt

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: ${{ matrix.path }}
        run: python manage.py test --verbosity 2

      - name: Build check (Django system check)
        working-directory: ${{ matrix.path }}
        run: python manage.py check

      # Build context is the repo root because each Dockerfile copies both
      # services/<service>/ and the shared services/lib/.
      - name: Build Docker image locally
        run: |
          docker build \
            -t ${{ matrix.service }}:${{ github.sha }} \
            -f ${{ matrix.path }}/Dockerfile \
            .

  # ---------------------------------------------------------------------------
  # Part 2 — Compose-level verification: validate + build + boot the whole
  # stack and hit the gateway health endpoint.
  # ---------------------------------------------------------------------------
  verify-compose:
    name: Verify Docker Compose stack
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Compose file (dev)
        run: docker compose config

      - name: Validate Compose file (prod)
        # Prove the prod file is well-formed with dummy vars, so a broken
        # docker-compose.prod.yml can never reach main.
        env:
          DOCKERHUB_USERNAME: ci-dummy
          APP_NAME: devops
          IMAGE_TAG: sha-0000000
        run: docker compose -f docker-compose.prod.yml config

      - name: Build Compose stack
        run: docker compose build --pull

      - name: Start Compose stack (wait for healthy)
        # --wait blocks until every service passes its health check, so we no
        # longer guess with `sleep`. Fails the job if anything is unhealthy.
        run: docker compose up -d --wait

      - name: Show running services
        run: docker compose ps

      - name: Check gateway health (through Nginx)
        run: curl --fail http://localhost:8080/service-a/health

      - name: End-to-end flow across A -> B -> C
        # The whole point of the architecture: prove the request chain works,
        # not just that containers boot.
        run: |
          body=$(curl --fail --silent http://localhost:8080/service-a/greet-service-b)
          echo "$body"
          echo "$body" | grep -q '"status": *"success"'

      - name: Stop Compose stack
        if: always()
        run: docker compose down -v

  # ---------------------------------------------------------------------------
  # Part 3 — Publish images to Docker Hub, MAIN ONLY, tagged by commit SHA.
  # Requires repo Variable DOCKERHUB_USERNAME and Secret DOCKERHUB_TOKEN.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish Docker images
    runs-on: ubuntu-latest
    needs: verify-compose
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: service-a
            path: ./services/service-a
          - service: service-b
            path: ./services/service-b
          - service: service-c
            path: ./services/service-c
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute short SHA and lowercase app name
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          # Docker Hub repository names must be lowercase.
          echo "APP_NAME=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image (commit-SHA tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.path }}/Dockerfile
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}-${{ matrix.service }}:sha-${{ env.SHORT_SHA }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Write deployment summary
        run: |
          echo "### Published Image" >> "$GITHUB_STEP_SUMMARY"
          echo "Service: ${{ matrix.service }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Image: ${{ vars.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}-${{ matrix.service }}:sha-${{ env.SHORT_SHA }}" >> "$GITHUB_STEP_SUMMARY"
