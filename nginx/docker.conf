upstream service_a_backend {
    server service-a:3001;
    keepalive 16;
}

map $http_x_request_id $req_id {
    default $http_x_request_id;
    ""      $request_id;
}

log_format platform_json escape=json
    '{'
        '"timestamp":"$time_iso8601",'
        '"request_id":"$req_id",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"upstream":"$upstream_addr",'
        '"request_time":$request_time'
    '}';

server {
    listen 80 default_server;
    server_name _;

    access_log /var/log/nginx/access.log platform_json;
    error_log  /var/log/nginx/error.log warn;

    location /service-a/ {
        proxy_pass http://service_a_backend/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID      $req_id;
        add_header X-Request-ID $req_id always;
        proxy_connect_timeout 3s;
        proxy_read_timeout    30s;
    }

    location = /service-a {
        return 308 /service-a/;
    }

    location / {
        default_type application/json;
        return 404 '{"status":"not_found","message":"Only /service-a/ is exposed"}';
    }
}
