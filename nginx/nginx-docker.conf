# Nginx config for the Docker Compose stacks (dev + prod) — public entry point.
# Mounted at /etc/nginx/conf.d/default.conf in the nginx container.
#
# Upstream uses the Compose service name `service-a` (Docker DNS), not
# 127.0.0.1 — inside a container 127.0.0.1 would mean the nginx container itself.

map $http_x_request_id $req_id {
    default $http_x_request_id;
    ""      $request_id;
}

log_format platform_json escape=json
    '{'
        '"timestamp":"$time_iso8601",'
        '"request_id":"$req_id",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"upstream":"$upstream_addr",'
        '"request_time":$request_time'
    '}';

upstream service_a_backend {
    server service-a:3001;          # Compose service name (Docker DNS)
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    server_tokens off;   # don't broadcast the Nginx version to clients

    access_log /var/log/nginx/platform_access.json platform_json;
    error_log  /var/log/nginx/platform_error.log warn;

    location /service-a/ {
        proxy_pass http://service_a_backend/;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $req_id;

        add_header X-Request-ID $req_id always;

        proxy_connect_timeout 3s;
        proxy_read_timeout    10s;
    }

    location = /service-a {
        return 308 /service-a/;
    }

    location / {
        default_type application/json;
        return 404 '{"status":"not_found","message":"Only /service-a/ is exposed through this proxy"}';
    }
}
