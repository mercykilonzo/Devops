# =============================================================================
# Nginx reverse proxy — public entry point for the platform.
#
# Install to:   /etc/nginx/sites-available/platform.conf
# Enable with:  ln -s ../sites-available/platform.conf /etc/nginx/sites-enabled/
#
# Traffic flow:
#   client -> :80 /service-a/<path>  -> 127.0.0.1:3001 /<path>  (Service A)
#
# ONLY Service A is exposed. There is no location block for Service B or C, so
# they are unreachable through Nginx. They are additionally bound to loopback
# and blocked by UFW (defense in depth).
#
# This file is included from the http{} context of the main nginx.conf, so the
# map / log_format / upstream directives below are valid here.
# =============================================================================

# Reuse the client's X-Request-ID for tracing, or fall back to Nginx's own
# per-request id when the client didn't send one.
map $http_x_request_id $req_id {
    default $http_x_request_id;
    ""      $request_id;
}

# Structured JSON access log (escape=json keeps the output valid JSON).
log_format platform_json escape=json
    '{'
        '"timestamp":"$time_iso8601",'
        '"request_id":"$req_id",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"upstream":"$upstream_addr",'
        '"request_time":$request_time'
    '}';

# Named upstream for Service A (single backend, easy to extend later).
upstream service_a_backend {
    server 127.0.0.1:3001;
    keepalive 16;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    access_log /var/log/nginx/platform_access.json platform_json;
    error_log  /var/log/nginx/platform_error.log warn;

    # ---- Public route: Service A ------------------------------------------
    # The trailing slash on both location and proxy_pass strips the
    # "/service-a/" prefix, so "/service-a/health" -> upstream "/health".
    location /service-a/ {
        proxy_pass http://service_a_backend/;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $req_id;   # propagate trace id downstream

        # Echo the trace id back to the client too.
        add_header X-Request-ID $req_id always;

        proxy_connect_timeout 3s;
        proxy_read_timeout    10s;
    }

    # Convenience redirect so "/service-a" (no slash) also works.
    location = /service-a {
        return 308 /service-a/;
    }

    # ---- Everything else: not exposed -------------------------------------
    # Service B and Service C have NO route here. Any other path -> 404 JSON.
    location / {
        default_type application/json;
        return 404 '{"status":"not_found","message":"Only /service-a/ is exposed through this proxy"}';
    }
}
