# Production Compose file — runs PUSHED Docker Hub images (never builds locally).
#
# Required environment (see .env.example):
#   DOCKERHUB_USERNAME  your Docker Hub username (lowercase)
#   APP_NAME            repo/app name used in image names (lowercase, e.g. devops)
#   IMAGE_TAG           the version to run, e.g. sha-a1b2c3d  (never "latest")
#
# Deploy with: ./scripts/deploy.sh sha-<short-commit-hash>
#
# Networks: only Nginx is on `frontend` and publishes a host port. The
# `backend` network is internal (no external access). Service A bridges both.
# Health checks gate readiness so dependents only start once a service is READY.

services:

  service-a:
    image: ${DOCKERHUB_USERNAME}/${APP_NAME}-service-a:${IMAGE_TAG}
    environment:
      SERVICE_B_URL: http://service-b:3002
      SERVICE_C_URL: http://service-c:3003
      PORT: 3001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      service-b:
        condition: service_healthy
      service-c:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped
    stop_grace_period: 30s

  service-b:
    image: ${DOCKERHUB_USERNAME}/${APP_NAME}-service-b:${IMAGE_TAG}
    environment:
      SERVICE_C_URL: http://service-c:3003
      PORT: 3002
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - backend
    restart: unless-stopped
    stop_grace_period: 30s

  service-c:
    image: ${DOCKERHUB_USERNAME}/${APP_NAME}-service-c:${IMAGE_TAG}
    environment:
      SERVICE_A_URL: http://service-a:3001
      PORT: 3003
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - backend
    restart: unless-stopped
    stop_grace_period: 30s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"                     # the ONLY host-published port
    volumes:
      - ./nginx/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      service-a:
        condition: service_healthy
    networks:
      - frontend
    restart: unless-stopped
    stop_grace_period: 30s

networks:
  frontend:
  backend:
    internal: true                    # no route to the outside world
