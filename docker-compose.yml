services:

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "8080:80"                     # the ONLY host-published port
    volumes:
      - ./nginx/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      service-a:
        condition: service_healthy    # wait until A is READY, not just started
    networks:
      - frontend
    restart: unless-stopped
    stop_grace_period: 30s

  service-a:
    build:
      context: .
      dockerfile: services/service-a/Dockerfile
    container_name: service-a
    environment:
      SERVICE_B_URL: http://service-b:3002
      SERVICE_C_URL: http://service-c:3003
      PORT: 3001
    expose:
      - "3001"                        # internal to the compose network only
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      service-b:
        condition: service_healthy
      service-c:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped
    stop_grace_period: 30s

  service-b:
    build:
      context: .
      dockerfile: services/service-b/Dockerfile
    container_name: service-b
    environment:
      SERVICE_C_URL: http://service-c:3003
      PORT: 3002
    expose:
      - "3002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - backend
    restart: unless-stopped
    stop_grace_period: 30s

  service-c:
    build:
      context: .
      dockerfile: services/service-c/Dockerfile
    container_name: service-c
    environment:
      SERVICE_A_URL: http://service-a:3001
      PORT: 3003
    expose:
      - "3003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - backend
    restart: unless-stopped
    stop_grace_period: 30s

networks:
  frontend:
  backend:
    internal: true                    # private: no route to the outside world
