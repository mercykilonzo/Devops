services:

  service-a:
    build:
      context: .
      dockerfile: services/service-a/Dockerfile
    container_name: service-a
    command: gunicorn service_a.wsgi:application --bind 0.0.0.0:3001 --workers 4 --timeout 30
    environment:
      SERVICE_B_URL: http://service-b:3002
      SERVICE_C_URL: http://service-c:3003
      PORT: 3001
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: service-a
    depends_on:
      - service-b
      - service-c
    networks:
      - internal

  service-b:
    build:
      context: .
      dockerfile: services/service-b/Dockerfile
    container_name: service-b
    command: gunicorn service_b.wsgi:application --bind 0.0.0.0:3002 --workers 4 --timeout 30
    environment:
      SERVICE_C_URL: http://service-c:3003
      PORT: 3002
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: service-b
    networks:
      - internal

  service-c:
    build:
      context: .
      dockerfile: services/service-c/Dockerfile
    container_name: service-c
    command: gunicorn service_c.wsgi:application --bind 0.0.0.0:3003 --workers 4 --timeout 30
    environment:
      SERVICE_A_URL: http://service-a:3001
      PORT: 3003
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: service-c
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - service-a
    networks:
      - internal

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - internal

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - internal

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4318:4318"
      - "6831:6831/udp"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - internal

volumes:
  prometheus-data:
  grafana-data:

networks:
  internal:
    driver: bridge