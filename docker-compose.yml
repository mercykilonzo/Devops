services:

  # ── Gateway ─────────────────────────────────────────────────────────────

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "80:80"                         # public entry point for the observability lab
    volumes:
      - ./nginx/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      service-a:
        condition: service_healthy      # wait until A is READY, not just started
    networks:
      - frontend
    restart: unless-stopped
    stop_grace_period: 30s

  # ── Application Services ────────────────────────────────────────────────

  service-a:
    build:
      context: .
      dockerfile: services/service-a/Dockerfile
    container_name: service-a
    environment:
      SERVICE_B_URL: http://service-b:3002
      SERVICE_C_URL: http://service-c:3003
      PORT: 3001
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: service-a
    expose:
      - "3001"                          # internal to the compose network only
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      service-b:
        condition: service_healthy
      service-c:
        condition: service_healthy
    networks:
      - frontend                        # reachable by nginx
      - backend                         # reaches B, C and jaeger
    restart: unless-stopped
    stop_grace_period: 30s

  service-b:
    build:
      context: .
      dockerfile: services/service-b/Dockerfile
    container_name: service-b
    environment:
      SERVICE_C_URL: http://service-c:3003
      PORT: 3002
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: service-b
    expose:
      - "3002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - backend
    restart: unless-stopped
    stop_grace_period: 30s

  service-c:
    build:
      context: .
      dockerfile: services/service-c/Dockerfile
    container_name: service-c
    environment:
      SERVICE_A_URL: http://service-a:3001
      PORT: 3003
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: service-c
    expose:
      - "3003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - backend
    restart: unless-stopped
    stop_grace_period: 30s

  # ── Observability Services ──────────────────────────────────────────────
  # On both networks: `backend` to scrape/receive from the services,
  # `frontend` to publish their UIs to the host.

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - frontend
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - frontend
      - backend
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP
      - "6831:6831/udp" # Jaeger compact thrift
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:

networks:
  frontend:
  backend:
    internal: true                      # private: no route to the outside world
